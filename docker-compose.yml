version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: educore-postgres
    restart: always
    environment:
      POSTGRES_USER: educore_user
      POSTGRES_PASSWORD: educore_password
      POSTGRES_DB: educore_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - educore-network
    # Veritabanının hazır olup olmadığını kontrol ediyoruz
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educore_user -d educore_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: educore-config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    networks:
      - educore-network

  educore-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: educore-app
    ports:
      - "8081:8080"
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      # Backend'i başlatmadan önce veritabanının "sağlıklı" olmasını bekle
      postgres-db:
        condition: service_healthy
      config-server:
        condition: service_started
    # CSV Klasörünü hem uygulamanın çalıştığı dizine hem de kök dizine bağlıyoruz
    volumes:
      - ./csv_uploads:/app/csv_uploads
      - ./csv_uploads:/csv_uploads
    networks:
      - educore-network

  educore-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educore-frontend
    ports:
      - "3000:80"
    depends_on:
      - educore-backend
    networks:
      - educore-network

networks:
  educore-network:
    driver: bridge

volumes:
  pgdata: